services:
  - type: web
    name: trade-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TRADE_API_KEY
        value: trade-secret-key-2024
      - key: PYTHON_VERSION
        value: 3.10.13